<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carta de Amor para Constanza</title>
    <style>
        body {
            background: #ffe4e1;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .carta {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 32px;
            max-width: 400px;
            text-align: center;
            display: none;
        }
        button {
            background: #ff69b4;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 24px;
            transition: background 0.2s;
        }
        button:hover {
            background: #ff1493;
        }
    </style>
</head>
<body>
    <button id="abrirCarta">Abrir carta</button>
    <div class="carta" id="carta">
        <h2>Para Constanza</h2>
        <p>
            Querida Constanza,<br>
            Cada día que pasa, mi cariño por ti crece más y más. Eres la razón de mis sonrisas, mi inspiración y mi alegría. Gracias por ser tan especial y llenar mi vida de amor.<br>
            Te quiero mucho.
        </p>
        <span style="font-size:1.2em;">❤️</span>
    </div>
    <script>
        document.getElementById('abrirCarta').addEventListener('click', function() {
            document.getElementById('carta').style.display = 'block';
            this.style.display = 'none';
        });
    </script>
</body>
</html>
