<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta para Constanza</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
padding:40px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#carta{
margin-top:30px;
font-size:20px;
background:white;
padding:20px;
border-radius:10px;
width:70%;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h1>Una carta especial 💌</h1>

<button onclick="mostrarCarta()">Abrir carta</button>

<div id="carta"></div>

<script>

let texto = `Constanza,

Desde que llegaste a mi vida todo se siente diferente.
Tu sonrisa me hace feliz incluso en los días difíciles.

Eres una persona muy especial para mí
y cada momento contigo vale muchísimo.

Gracias por existir. ❤️`;

let i = 0;

function mostrarCarta(){
let carta = document.getElementById("carta");

function escribir(){
if(i < texto.length){
carta.innerHTML += texto.charAt(i);
i++;
setTimeout(escribir,40);
}
}

escribir();
}

</script>

</body>
</html>
